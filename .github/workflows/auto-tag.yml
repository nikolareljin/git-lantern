name: auto-tag

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: read
  actions: write

jobs:
  auto-tag-release:
    # Detect a release/x.y.z -> main merge, create and push the version tag, then
    # dispatch release.yml (workflow_dispatch bypasses the GITHUB_TOKEN tag-push
    # trigger restriction) so a GitHub Release is generated for the new tag.
    uses: nikolareljin/ci-helpers/.github/workflows/auto-tag-release.yml@production
    with:
      # git-lantern does not carry a floating production tag.
      update_production_tag: false
      release_workflow: release.yml
